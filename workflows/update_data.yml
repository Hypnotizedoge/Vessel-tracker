name: Daily Vessel Data Sync

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at 00:00 UTC
  workflow_dispatch:      # Allows manual trigger via GitHub Actions tab

jobs:
  sync-data:
    runs-on: ubuntu-latest

    permissions:
      # Required to commit and push updated CSV and JSON metadata back to the repository
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Vessel Data Sync Script
      run: python run_sync.py

    - name: Commit and Push Changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Auto-sync GFW vessel event data [skip ci]"
        file_pattern: 'gfw_extracted_data.csv gfw_sync_metadata.json'
        branch: main
